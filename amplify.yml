version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@latest --activate
        - pnpm install --frozen-lockfile
        - node scripts/patch-nft-memory.js
    build:
      commands:
        - export NODE_OPTIONS="--max-old-space-size=6144"
        - export NEXT_TELEMETRY_DISABLED=1
        - cat /proc/meminfo | grep -E "MemTotal|MemFree|MemAvailable"
        - bash -c 'pnpm exec next build --webpack 2>&1; EXIT=$?; echo "===BUILD_EXIT_CODE:$EXIT==="; exit $EXIT'
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
