version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@latest --activate
        - pnpm install --frozen-lockfile
        - node scripts/patch-nft-memory.js
    build:
      commands:
        - export NODE_OPTIONS="--max-old-space-size=3072"
        - export NEXT_TELEMETRY_DISABLED=1
        - bash -c '(while true; do CGUSE=$(cat /sys/fs/cgroup/memory/memory.usage_in_bytes 2>/dev/null || echo "N/A"); printf "CG_USE_BYTES:%s\n" "$CGUSE"; sleep 3; done) & MONITOR=$!; pnpm exec next build --webpack 2>&1; EXIT=$?; kill $MONITOR 2>/dev/null; echo "===BUILD_EXIT_CODE:$EXIT==="; exit $EXIT'
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
