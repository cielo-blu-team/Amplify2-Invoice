version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@latest --activate
        - pnpm install --frozen-lockfile
        - node scripts/patch-nft-memory.js
    build:
      commands:
        - export NODE_OPTIONS="--max-old-space-size=6144"
        - export NEXT_TELEMETRY_DISABLED=1
        - cat /proc/meminfo | grep -E "MemTotal|MemFree|MemAvailable"
        - cat /sys/fs/cgroup/memory/memory.limit_in_bytes 2>/dev/null || cat /sys/fs/cgroup/memory.max 2>/dev/null || echo "cgroup-limit-unknown"
        - bash -c '(while true; do printf "MEM_AVAIL_KB:$(grep MemAvailable /proc/meminfo | awk "{print \$2}")\n"; sleep 5; done) & MONITOR=$!; pnpm exec next build --webpack 2>&1; EXIT=$?; kill $MONITOR 2>/dev/null; echo "===BUILD_EXIT_CODE:$EXIT==="; exit $EXIT'
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
