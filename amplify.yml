version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@latest --activate
        - pnpm install --frozen-lockfile
    build:
      commands:
        - export NODE_OPTIONS="--max-old-space-size=8192"
        - export NEXT_TELEMETRY_DISABLED=1
        - node --max-old-space-size=3000 ./node_modules/next/dist/bin/next build --webpack --experimental-build-mode compile
        - cp .next/server/middleware.js .next/server/proxy.js && cp .next/server/middleware.js.nft.json .next/server/proxy.js.nft.json || true
        - node --max-old-space-size=3000 ./node_modules/next/dist/bin/next build --webpack --experimental-build-mode generate
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
