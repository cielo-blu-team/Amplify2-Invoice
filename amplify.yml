version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@latest --activate
        - pnpm install --frozen-lockfile
        - node scripts/patch-nft-memory.js
    build:
      commands:
        - export NODE_OPTIONS="--expose-gc --max-old-space-size=3072"
        - export NEXT_TELEMETRY_DISABLED=1
        - bash -c '(while true; do USE=$(cat /sys/fs/cgroup/memory/memory.usage_in_bytes 2>/dev/null || echo N/A); printf "CG_USE:%s\n" "$USE"; sleep 1; done) & MON=$!; pnpm exec next build --webpack 2>&1; EXIT=$?; kill $MON 2>/dev/null; echo "===BUILD_EXIT_CODE:${EXIT}==="; exit $EXIT'
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
